<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>技能页原生滚动测试</title>
    <style>
      * { box-sizing: border-box; }
      html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
      * { overflow-anchor: none; }
      body {
        color: #000;
        background: #f9f9f9;
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif;
      }
      button, input { font: inherit; }
      button { border: 0; background: transparent; }
      .test-window { width: 100%; height: 100%; display: grid; grid-template-columns: 240px minmax(0, 1fr); }
      .side {
        height: 100%;
        padding: 72px 16px 16px;
        background: #f3f3f3;
        box-shadow: inset -1px 0 0 #e5e5e5;
      }
      .side h1 { margin: 0 0 24px; font-size: 18px; line-height: 28px; }
      .side p { margin: 0; color: #999; font-size: 13px; line-height: 20px; }
      .main { position: relative; min-width: 0; height: 100%; }
      .titlebar {
        position: absolute;
        z-index: 20;
        top: 0;
        right: 0;
        left: 0;
        height: 48px;
        background: #f9f9f9;
        pointer-events: none;
      }
      .titlebar span {
        height: 48px;
        display: none;
        align-items: center;
        padding: 0 16px;
        font-size: 14px;
        font-weight: 500;
        line-height: 20px;
      }
      .native-page {
        position: absolute;
        inset: 48px 0 0;
        overflow-x: hidden;
        overflow-y: auto;
        background: #f9f9f9;
        --toolbar-padding: 24px;
        --toolbar-visual-height: 80px;
      }
      .shell { width: min(944px, calc(100% - 96px)); margin: 0 auto; }
      .hero {
        height: 72px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 4px;
        padding-bottom: 24px;
        box-shadow: inset 0 -1px 0 #eaeaea;
      }
      .hero h2 { height: 28px; margin: 0; font-size: 18px; font-weight: 500; line-height: 28px; }
      .hero p { height: 16px; margin: 0; color: #999; font-size: 12px; line-height: 16px; }
      .toolbar {
        position: sticky;
        z-index: 10;
        top: 0;
        width: 100%;
        height: var(--toolbar-visual-height);
        background: #f9f9f9;
      }
      .toolbar-inner {
        width: 100%;
        height: var(--toolbar-visual-height);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: var(--toolbar-padding) 0;
        background: #f9f9f9;
      }
      .tabs { min-width: 0; display: flex; align-items: center; gap: 4px; overflow: hidden; }
      .tabs button {
        height: 32px;
        flex: 0 0 auto;
        padding: 6px 12px;
        border-radius: 8px;
        color: #666;
        cursor: pointer;
      }
      .tabs button.active { color: #000; background: #eaeaea; }
      .search {
        width: clamp(160px, 16vw, 200px);
        height: 32px;
        display: flex;
        align-items: center;
        gap: 8px;
        flex: 0 0 auto;
        padding: 0 12px;
        border-radius: 8px;
        box-shadow: inset 0 0 0 1px #e5e5e5;
      }
      .search:focus-within { box-shadow: inset 0 0 0 1px #000; }
      .search input { min-width: 0; flex: 1; padding: 0; border: 0; outline: 0; background: transparent; }
      .search button {
        width: 20px;
        height: 20px;
        display: none;
        align-items: center;
        justify-content: center;
        flex: 0 0 20px;
        border-radius: 8px;
        background: #eaeaea;
        cursor: pointer;
      }
      .search.has-value button { display: inline-flex; }
      .cards { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
      .results-shell { padding-top: calc(80px - var(--toolbar-visual-height)); }
      .card {
        min-width: 0;
        height: 148px;
        padding: 20px;
        border-radius: 8px;
        background: #f3f3f3;
      }
      .card:hover { background: #eaeaea; }
      .icon {
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-bottom: 12px;
        color: #fff;
        border-radius: 8px;
        background: var(--color);
        font-size: 16px;
        font-weight: 500;
      }
      .card h3 { height: 20px; margin: 0 0 4px; overflow: hidden; font-size: 14px; line-height: 20px; white-space: nowrap; text-overflow: ellipsis; }
      .card p { margin: 0; overflow: hidden; color: #999; font-size: 12px; line-height: 16px; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; }
      .empty {
        min-height: 240px;
        display: none;
        align-items: center;
        justify-content: center;
        color: #999;
        font-size: 14px;
      }
      .bottom-space { height: 48px; }
      .scroll-reserve { height: 0; pointer-events: none; }
      .native-page.docked + .titlebar span { display: flex; }
      @media (max-width: 1120px) { .cards { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    </style>
  </head>
  <body>
    <div class="test-window">
      <aside class="side">
        <h1>原生滚动测试</h1>
        <p>此页面与正式技能页完全隔离，只验证滚动、搜索和吸顶体验。</p>
      </aside>
      <main class="main">
        <section class="native-page" id="nativePage">
          <header class="shell hero">
            <h2>技能　<span style="color:#999">员工</span></h2>
            <p>已启用技能15个，共15个</p>
          </header>
          <section class="shell toolbar">
            <div class="toolbar-inner">
              <div class="tabs">
                <button class="active">全部</button><button>三方服务</button><button>创意</button>
                <button>数据科学</button><button>运维</button><button>邮件</button><button>游戏</button>
              </div>
              <label class="search" id="searchBox">
                <span>⌕</span>
                <input id="searchInput" placeholder="搜索技能" />
                <button id="clearButton" type="button" aria-label="清空搜索">×</button>
              </label>
            </div>
          </section>
          <div class="results-shell">
            <section class="shell cards" id="cards"></section>
            <section class="shell empty" id="empty">未找到技能，请更换关键词再试试</section>
          </div>
          <div class="bottom-space"></div>
          <div class="scroll-reserve" id="scrollReserve"></div>
        </section>
        <header class="titlebar"><span>技能　<span style="color:#999">员工</span></span></header>
      </main>
    </div>
    <script>
      const items = [
        ['ACUI桌面悬浮窗','轻量级桌面展示技能，把客户的产品、数据或品牌内容悬浮在用户桌面右下角。','#ff5c4d'],
        ['Airtable数据管理','用 RESTAPI 操作 Airtable：增删改查、筛选、更新插入。','#ff922b'],
        ['Apple备忘录','用 memoCLI 管理 Apple 备忘录：创建、搜索、编辑。','#27b66a'],
        ['Apple提醒事项','用 remindctl 管理提醒事项：添加、列出、完成。','#0088ff'],
        ['架构图生成','生成深色 SVG 架构、云与基础设施图。','#7080ff'],
        ['arXiv论文检索','按关键词、作者、分类和 ID 检索 arXiv 论文。','#966cff'],
        ['字符画生成','字符画、图片转字符等工具。','#e64d92'],
        ['字符视频生成','视频与音频转彩色字符。','#ff5c4d'],
        ['AudioCraft音频生成','MusicGen 文生音乐、AudioGen 文生音效。','#ff922b'],
        ['信息图生成','多种风格与布局的信息图生成。','#27b66a'],
        ['博客与RSS监控','监控博客与 RSS/Atom 订阅源。','#0088ff'],
        ['Claude Code编程助手','委托 Claude Code CLI 完成编程工作。','#7080ff'],
        ['HTML设计原型','设计一次性 HTML 作品与原型。','#966cff'],
        ['代码库检查用','检查代码库行数、语言和占比。','#e64d92'],
        ['Codex编程助手','委托 Codex CLI 完成开发功能。','#ff5c4d']
      ];
      const page = document.getElementById('nativePage');
      const cards = document.getElementById('cards');
      const empty = document.getElementById('empty');
      const input = document.getElementById('searchInput');
      const clear = document.getElementById('clearButton');
      const searchBox = document.getElementById('searchBox');
      const reserve = document.getElementById('scrollReserve');
      const STICKY_ANCHOR = 72;
      const COMPACT_END = 88;
      let isDocked = false;
      let scrollFrame = 0;

      function cardMarkup(item) {
        const first = /^[a-z]/i.test(item[0]) ? item[0][0].toUpperCase() : item[0][0];
        return `<article class="card"><div class="icon" style="--color:${item[2]}">${first}</div><h3>${item[0]}</h3><p>${item[1]}</p></article>`;
      }

      function setDocked(nextDocked) {
        if (isDocked === nextDocked) return;
        isDocked = nextDocked;
        page.classList.toggle('docked', isDocked);
      }

      function syncDocked(scrollTop) {
        setDocked(scrollTop >= STICKY_ANCHOR);
      }

      function syncToolbarMetrics(scrollTop) {
        const progress = Math.min(1, Math.max(0, (scrollTop - STICKY_ANCHOR) / (COMPACT_END - STICKY_ANCHOR)));
        const padding = 24 - progress * 8;
        const visualHeight = 80 - progress * 16;
        page.style.setProperty('--toolbar-padding', `${padding}px`);
        page.style.setProperty('--toolbar-visual-height', `${visualHeight}px`);
      }

      function syncLayout(scrollTop) {
        syncToolbarMetrics(scrollTop);
        syncDocked(scrollTop);
      }

      function syncFromCurrentScroll() {
        syncLayout(page.scrollTop);
      }

      function render() {
        // Once the toolbar is fully compact, deeper scroll positions look
        // identical. Normalize that invisible history so every new result set
        // genuinely starts from the current visible toolbar edge.
        const anchor = Math.min(page.scrollTop, COMPACT_END);
        syncLayout(anchor);
        const keyword = input.value.trim().toLowerCase();
        const result = keyword ? items.filter(item => `${item[0]} ${item[1]}`.toLowerCase().includes(keyword)) : items;

        // Keep the current scroll range valid while replacing a long result
        // set with a short one. Otherwise the browser clamps scrollTop before
        // the new layout has been measured.
        reserve.style.height = `${page.clientHeight + page.scrollTop}px`;
        page.scrollTop = anchor;
        syncLayout(anchor);
        cards.innerHTML = result.map(cardMarkup).join('');
        cards.style.display = result.length ? 'grid' : 'none';
        empty.style.display = result.length ? 'none' : 'flex';
        searchBox.classList.toggle('has-value', Boolean(input.value));

        // A short result set must not force the browser to clamp scrollTop and
        // pull the sticky regions downward. This reserve only preserves the
        // current position; it never creates additional downward travel.
        const requiredBottom = anchor + page.clientHeight;
        const contentBottom = reserve.offsetTop;
        reserve.style.height = `${Math.max(0, requiredBottom - contentBottom)}px`;
        page.scrollTop = anchor;
        syncLayout(anchor);
      }

      function scheduleScrollSync() {
        if (scrollFrame) return;
        scrollFrame = requestAnimationFrame(() => {
          scrollFrame = 0;
          syncFromCurrentScroll();
        });
      }

      page.addEventListener('scroll', scheduleScrollSync, { passive: true });
      page.addEventListener('wheel', scheduleScrollSync, { passive: true });
      input.addEventListener('input', render);
      clear.addEventListener('click', () => { input.value = ''; render(); input.focus(); });
      render();
    </script>
  </body>
</html>
